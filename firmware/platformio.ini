; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = ./
shared_dir = shared

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.10/platform-espressif32.zip
board = esp32doit-devkit-v1
board_build.f_cpu = 240000000L
upload_protocol = esptool
upload_speed = 921600
framework = arduino
board_build.embed_txtfiles = 
	interface/index.html
lib_deps = 
	bblanchon/ArduinoJson@^7.2.1
	erriez/ErriezSerialTerminal@^1.1.4
	teemuatlut/TMCStepper@^0.7.3
	tfeldmann/Blinkenlight@^2.3.0

[ogstartracker]
name = "OG Star Tracker"
binary_name = "ogstartracker"
firmware_version = "2.2"
interface_version = "2.1"
mdns_name = "tracker"
wifi_ssid = "OG Star Tracker"
wifi_password = "password123"
build_type = release ;release/beta
custom_debug_port = \\.\COM5

[env:ogstartracker_09_north]
extends = env
build_type = ${ogstartracker.build_type}
extra_scripts = 
	pre:shared/versioning.py
	post:shared/generate_build_info.py
monitor_speed = 115200
build_flags = 
	-D AP_MODE=1
    -D NAME=${ogstartracker.name}
	-D BINARY_NAME=${ogstartracker.binary_name}
	-D FIRMWARE_VERSION=\"${ogstartracker.firmware_version}\"
    -D INTERFACE_VERSION=\"${ogstartracker.interface_version}\"
	-D DEBUG=0
    -D c_DIRECTION=1 ;1 is for north hemisphere and 0 for south hemisphere
	-D MDNS_NAME=\"${ogstartracker.mdns_name}\"
	-D WIFI_SSID=\"${ogstartracker.wifi_ssid}\"
	-D WIFI_PASSWORD=\"${ogstartracker.wifi_password}\"
	-D STEPPER_TYPE=STEPPER_0_9
	-D STEPPER_SUFFIX='"09deg"'
	-D WEBSERVER_PORT=80
	-D TRACKING_RATE=TRACKING_SIDEREAL
	-Wall -Wextra -Os

[env:ogstartracker_09_south]
extends = env
build_type = ${ogstartracker.build_type}
